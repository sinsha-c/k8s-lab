apiVersion: apps/v1
kind: Deployment
metadata:
  name: apache-deployment
  namespace: dev-webapp
  labels:
    app: apache-webapp
spec:
  replicas: 3
  selector:
    matchLabels:
      app: apache-webapp
  template:
    metadata:
      labels:
        app: apache-webapp
    spec:
      containers:
        - name: apache
          image: httpd:2.4.54
          ports:
            - containerPort: 80
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "250m"
              memory: "256Mi"
          env:
            - name: ADMIN_USER
              valueFrom:
                secretKeyRef:
                  name: apache-secret
                  key: admin-user
            - name: ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: apache-secret
                  key: admin-password
          volumeMounts:
            - name: html-volume
              mountPath: /usr/local/apache2/htdocs/
      volumes:
        - name: html-volume
          configMap:
            name: apache-config

